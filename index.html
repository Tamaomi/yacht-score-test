<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c58a4a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ヨット点数計算表</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wood-bg">
    <div class="app-shell">
      <header class="app-header">
        <button id="menuButton" class="icon-button" type="button" aria-label="人数選択">☰</button>
        <h1 id="turnTitle">ターン 1 / 12</h1>
        <button id="settingsButton" class="icon-button" type="button" aria-label="設定">⚙</button>
      </header>

      <nav id="modeTabs" class="mode-tabs" aria-label="人数選択">
        <button type="button" data-count="2" class="active">2人用</button>
        <button type="button" data-count="3">3人用</button>
        <button type="button" data-count="4">4人用</button>
      </nav>

      <main>
        <section class="name-row" id="nameRow" aria-label="プレイヤー名"></section>
        <section id="scoreBoard" class="score-board" aria-label="ヨット点数表"></section>

        <section class="progress-area">
          <button id="prevRoleButton" class="nav-button" type="button">◀ 前の役へ</button>
          <p id="inputStatus">エースを入力中</p>
          <button id="nextRoleButton" class="nav-button disabled" type="button">次の役へ ▶</button>
        </section>

        <!-- 修正内容：全員の全スコア入力後にだけ表示する勝敗判定ボタン -->
        <button id="judgeButton" class="judge-button" type="button" hidden>勝敗判定</button>

        <!-- 修正内容：下部の簡易ルール説明と役の点数表示を削除 -->
      </main>
    </div>
  </div>

  <!-- 修正内容：スコア入力時のポップアップを廃止し、表のセルへ直接入力する方式に変更 -->

  <!-- 修正内容：勝敗判定結果を表示するダイアログ -->
  <dialog id="resultDialog" class="result-dialog">
    <div class="result-content">
      <img src="honda.png" alt="ペットボトルを持つ人物のイラスト">
      <p>ホンダの勝ち！！</p>
      <button id="closeResultButton" class="primary-button" type="button">閉じる</button>
    </div>
  </dialog>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog">
      <h2>設定</h2>
      <div id="settingsNames"></div>
      <div class="dialog-actions">
        <button type="button" id="resetButton" class="danger-button">リセット</button>
        <button type="submit" value="cancel" class="plain-button">閉じる</button>
        <button type="button" id="saveSettingsButton" class="primary-button">保存</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
